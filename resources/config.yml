      type: "message"
  completed:
    message: "§7[§fОчистка§7] §fОчистка сервера §aзавершена§f!"
    type: "message"
  
  toast-title: "Очистка"


# Опции очистки...
clear-options:
  clear-mobs: true 
  clear-items: true 

  mob-exceptions: 
    - "minecraft:horse"
    - "minecraft:iron_golem"
  item-exceptions: 
    - "minecraft:diamond"
    - "minecraft:nether_star"

# Сообщения...
messages:
  no_permission: "§cУ вас недостаточно прав."
  
