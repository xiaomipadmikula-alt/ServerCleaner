# Версия конфига - НЕ МЕНЯЙТЕ!
config-version: 1.3

# Настройки...
# Интервал 180 секунд = 3 минуты
settings:
  interval: 180
  countdown:
    "60": 
      message: "§l§2Очистка » Очистка сервера через §f1 §2минуту..."
      type: "tip"
    "30":
      message: "§l§2Очистка » Очистка сервера через §f30 §2секунд..."
      type: "toast"
    "20":
      message: "§l§2Очистка » Очистка сервера через §f20 §2секунд..."
      type: "message"
    "10":
      message: "§l§2Очистка » Очистка сервера через §f10 §2секунд..."
      type: "message"
    "5":
      message: "§l§2Очистка » Очистка сервера через §f5 §2секунд..."
      type: "message"
    "4":
      message: "§l§2Очистка » Очистка сервера через §f4 §2секунды..."
      type: "message"
    "3":
      message: "§l§2Очистка » Очистка сервера через §f3 §2секунды..."
      type: "message"
    "2":
      message: "§l§2Очистка » Очистка сервера через §f2 §2секунды..."
      type: "message"
    "1":
      message: "§l§2Очистка » Очистка сервера через §f1 §2секунду..."
      type: "message"
  completed:
    message: "§l§2Очистка » §fОчистка сервера §2завершена..."
    type: "message"
  
  toast-title: "§l§2ServerCleaner »"


# Опции очистки...
clear-options:
  clear-mobs: true 
  clear-items: true 

  mob-exceptions: 
    - "minecraft:horse"
    - "minecraft:iron_golem"
  item-exceptions: 
    - "minecraft:diamond"
    - "minecraft:nether_star"

# Сообщения...
messages:
  no_permission: "§l§2Очистка » У вас нет прав на использование этой команды..."
  
